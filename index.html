<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ほしまど ― 空にかざす星座早見</title>
<meta name="description" content="スマホを夜空にかざすと、その方向にある星座と星の名前が見えるWebプラネタリウム">
<style>
:root {
  --bg: #05070f;
  --panel: #10141fee;
  --panel-border: #2a3350;
  --text: #dfe6f5;
  --text-dim: #8b95ad;
  --accent: #7fa8ff;
  --card-shadow: 0 -8px 32px #000a;
}
body.red {
  --bg: #0a0202;
  --panel: #180505ee;
  --panel-border: #4a1515;
  --text: #ff9a8a;
  --text-dim: #a05548;
  --accent: #ff6b5a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Noto Sans JP", sans-serif;
  -webkit-user-select: none; user-select: none;
  touch-action: none;
}
#sky { position: fixed; inset: 0; display: block; }

/* ---- 上部バー ---- */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; gap: 8px;
  padding: calc(8px + env(safe-area-inset-top)) 12px 8px;
  pointer-events: none;
}
#status {
  pointer-events: auto; cursor: pointer;
  background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 20px; padding: 6px 14px; font-size: 13px;
  display: flex; gap: 8px; align-items: center;
}
#status .dim { color: var(--text-dim); }
#topbar .spacer { flex: 1; }
.iconbtn {
  pointer-events: auto; cursor: pointer;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--panel); border: 1px solid var(--panel-border);
  color: var(--text); font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s ease;
}
.iconbtn:active { background: var(--panel-border); }

/* ---- 下部の視線表示 ---- */
#gaze {
  position: fixed; bottom: calc(12px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%);
  font-size: 12px; color: var(--text-dim);
  background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 16px; padding: 4px 14px; pointer-events: none;
  white-space: nowrap;
}

/* ---- 情報カード ---- */
#card {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--panel); border-top: 1px solid var(--panel-border);
  border-radius: 16px 16px 0 0; box-shadow: var(--card-shadow);
  padding: 16px 20px calc(20px + env(safe-area-inset-bottom));
  transform: translateY(105%); transition: transform .2s ease;
  max-height: 45%; overflow-y: auto;
}
#card.show { transform: translateY(0); }
#card h2 { font-size: 20px; margin-bottom: 4px; font-weight: 600; }
#card .sub { font-size: 13px; color: var(--accent); margin-bottom: 8px; }
#card p { font-size: 14px; line-height: 1.7; color: var(--text); }
#card .meta { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
#card .close {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
}

/* ---- 設定パネル ---- */
#settings {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(320px, 88vw);
  background: var(--panel); border-left: 1px solid var(--panel-border);
  transform: translateX(105%); transition: transform .2s ease;
  padding: calc(16px + env(safe-area-inset-top)) 20px 20px;
  overflow-y: auto; z-index: 10;
}
#settings.show { transform: translateX(0); }
#settings h2 { font-size: 16px; margin-bottom: 16px; }
#settings h3 { font-size: 12px; color: var(--text-dim); margin: 20px 0 8px; font-weight: 600; }
#settings label.row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; font-size: 14px; cursor: pointer;
}
#settings select, #settings button.wide {
  width: 100%; padding: 8px 12px; margin-top: 4px;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--panel-border); border-radius: 8px;
  font-size: 14px; cursor: pointer;
}
#settings input[type=range] { width: 100%; accent-color: var(--accent); }
#settings input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); }
#settings .credit { font-size: 11px; color: var(--text-dim); line-height: 1.6; margin-top: 24px; }
#settings .credit a { color: var(--accent); }
#settings .kbd { font-size: 11px; color: var(--text-dim); line-height: 1.8; }
#settings .kbd b { color: var(--text); font-weight: 600; border: 1px solid var(--panel-border); border-radius: 4px; padding: 0 5px; margin-right: 4px; }

/* ---- オンボーディング ---- */
#onboard {
  position: fixed; inset: 0; z-index: 20;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 32px; text-align: center;
}
#onboard.hide { display: none; }
#onboard h1 { font-size: 32px; font-weight: 600; letter-spacing: .2em; }
#onboard .tag { color: var(--text-dim); font-size: 14px; line-height: 1.8; margin-bottom: 16px; }
#onboard button {
  width: min(300px, 80vw); padding: 14px; border-radius: 12px;
  font-size: 15px; cursor: pointer; transition: opacity .15s ease;
}
#onboard button:active { opacity: .7; }
#onboard .primary { background: var(--accent); color: #0a1020; border: none; font-weight: 600; }
#onboard .secondary { background: none; color: var(--text); border: 1px solid var(--panel-border); }
#onboard .note { font-size: 11px; color: var(--text-dim); max-width: 320px; line-height: 1.6; }

/* ---- トースト ---- */
#toast {
  position: fixed; top: calc(64px + env(safe-area-inset-top)); left: 50%;
  transform: translateX(-50%);
  background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 10px; padding: 10px 18px; font-size: 13px;
  opacity: 0; transition: opacity .2s ease; pointer-events: none;
  max-width: 88vw; text-align: center; z-index: 30;
}
#toast.show { opacity: 1; }
</style>
</head>

<canvas id="sky"></canvas>

<div id="topbar">
  <div id="status" title="タップで設定を開く" role="button" tabindex="0" aria-label="設定を開く">
    <span id="locName">仙台</span><span class="dim" id="clock">--:--</span>
  </div>
  <div class="spacer"></div>
  <button class="iconbtn" id="modeBtn" title="センサー/手動の切り替え" aria-label="センサー/手動の切り替え">✋</button>
  <button class="iconbtn" id="settingsBtn" title="設定" aria-label="設定">⚙</button>
</div>

<div id="gaze"></div>

<div id="card">
  <button class="close" id="cardClose" title="閉じる (Esc)">✕</button>
  <h2 id="cardTitle"></h2>
  <div class="sub" id="cardSub"></div>
  <p id="cardDesc"></p>
  <div class="meta" id="cardMeta"></div>
</div>

<div id="settings">
  <h2>設定</h2>
  <h3>観測地点</h3>
  <select id="citySel"></select>
  <button class="wide" id="geoBtn">📍 現在地を取得</button>
  <h3>表示</h3>
  <label class="row">星座線 <input type="checkbox" id="optLines" checked></label>
  <label class="row">星座の名前 <input type="checkbox" id="optConstNames" checked></label>
  <label class="row">星の名前 <input type="checkbox" id="optNames" checked></label>
  <label class="row">赤いナイトモード <input type="checkbox" id="optRed"></label>
  <h3>視野角 <span id="fovVal"></span></h3>
  <input type="range" id="fovRange" min="25" max="100" step="1">
  <h3>キーボード</h3>
  <div class="kbd">
    <b>←→↑↓</b>視線移動（手動モード）<br>
    <b>+</b><b>−</b>ズーム <b>L</b>星座線 <b>N</b>星名 <b>R</b>赤モード <b>Esc</b>閉じる
  </div>
  <div class="credit">
    星データ: <a href="https://github.com/astronexus/HYG-Database" target="_blank" rel="noopener">HYG Database v4.1</a> (CC BY-SA 4.0)<br>
    星座線: <a href="https://github.com/Stellarium/stellarium" target="_blank" rel="noopener">Stellarium</a> modern skyculture (CC BY-SA 4.0)<br>
    ほしまど v1.0
  </div>
</div>

<div id="onboard">
  <h1>ほしまど</h1>
  <div class="tag">スマホを夜空にかざすと、<br>その方向にある星と星座の名前が見えます。</div>
  <button class="primary" id="startSensor">スマホをかざして見る</button>
  <button class="secondary" id="startDrag">ドラッグで見る（PC向け）</button>

</div>

    }

      r0[1] * f[2] - r0[2] * f[1],
      r0[2] * f[0] - r0[0] * f[2],
      r0[0] * f[1] - r0[1] * f[0],
    ];
    const ro = rollDeg * astro.D2R, c = Math.cos(ro), s = Math.sin(ro);
    // 画面上方向u が「基準上r0/u0系でロール分回った向き」になるように回転
    const u = [u0[0] * c + r0[0] * s, u0[1] * c + r0[1] * s, u0[2] * c + r0[2] * s];
    const r = [r0[0] * c - u0[0] * s, r0[1] * c - u0[1] * s, r0[2] * c - u0[2] * s];
    return { f, r, u };
  },
  // 単位ベクトル → スクリーン座標。後方はnull
  project(cam, v, focal, cx, cy) {
    const zf = v[0] * cam.f[0] + v[1] * cam.f[1] + v[2] * cam.f[2];
    if (zf < 0.05) return null;
    const x = v[0] * cam.r[0] + v[1] * cam.r[1] + v[2] * cam.r[2];
    const y = v[0] * cam.u[0] + v[1] * cam.u[1] + v[2] * cam.u[2];
    return [cx + focal * x / zf, cy - focal * y / zf];
  },
  focalLength(fovDeg, screenH) {
    return (screenH / 2) / Math.tan(fovDeg / 2 * astro.D2R);
  },
  // 視線ベクトルと画面上方向ベクトルからカメラ基底を直接作る（センサーモード用）。
  // 角度(az/alt/roll)を経由しないため天頂でも特異点がなく連続
  cameraFromVectors(fRaw, upRaw) {
    const norm = v => {
      const n = Math.hypot(v[0], v[1], v[2]);
      return n < 1e-9 ? null : [v[0] / n, v[1] / n, v[2] / n];
    };
    const f = norm(fRaw);
    if (!f) return this.makeCamera(0, 0, 0);
    // upから視線成分を除いて直交化。退化時（up∥視線）は天頂を基準に落とす
    let u = null;
    if (upRaw) {
      const d = upRaw[0] * f[0] + upRaw[1] * f[1] + upRaw[2] * f[2];
      u = norm([upRaw[0] - d * f[0], upRaw[1] - d * f[1], upRaw[2] - d * f[2]]);
    }
    if (!u) {
      u = norm([-f[2] * f[0], -f[2] * f[1], 1 - f[2] * f[2]]);
      if (!u) u = [0, 1, 0];
    }
    const r = [
      f[1] * u[2] - f[2] * u[1],
      f[2] * u[0] - f[0] * u[2],
      f[0] * u[1] - f[1] * u[0],
    ];
    return { f, r, u };
  },
};
// ==ASTRO-END==

// ---- センサー ----
// 実機検証メモ: iOSのwebkitCompassHeading補正とロール符号は実機で確認する（design.md リスク1,2,5）
const sensor = {
  active: false,
  hasReading: false,
  target: null, // {az, alt, roll}
  _matrix(alphaDeg, betaDeg, gammaDeg) {
    // W3C DeviceOrientation仕様の回転行列（端末座標→地上座標 x=東,y=北,z=上）
    const D2R = astro.D2R;
    const a = alphaDeg * D2R, b = betaDeg * D2R, g = gammaDeg * D2R;
    const cA = Math.cos(a), sA = Math.sin(a);
    const cB = Math.cos(b), sB = Math.sin(b);
    const cG = Math.cos(g), sG = Math.sin(g);
    return [
      cA * cG - sA * sB * sG, -cB * sA, cG * sA * sB + cA * sG,
      cG * sA + cA * sB * sG, cA * cB, sA * sG - cA * cG * sB,
      -cB * sG, sB, cB * cG,
    ];
  },
  headingOffset: null, // iOS用: 相対フレーム→真北の回転補正（度）
  _onEvent(e) {
    const alpha = e.alpha, beta = e.beta, gamma = e.gamma;
    this.lastRaw = { alpha, beta, gamma, heading: e.webkitCompassHeading, absolute: e.absolute, type: e.type };
    if (alpha == null || beta == null || gamma == null) return;
    const hasHeading = typeof e.webkitCompassHeading === "number" && !isNaN(e.webkitCompassHeading);
    if (!hasHeading && e.absolute !== true && this.expectAbsolute) {
      return; // absoluteが必要なイベント種で相対値しか来ない場合は捨てる
    }
    // 行列は常に生のα/β/γから作る（この三つ組は姿勢として常に連続）。
    // iOSでαをコンパス値で毎フレーム置き換えると、上向き姿勢でオイラー角の
    // 分解枝とコンパス値が同時に崩れて方位が横へ飛ぶ（B-004）
    const m = this._matrix(alpha, beta, gamma);
    // 端末背面(-z)が向く方向 = ユーザーがかざした方向
    let v = [-m[2], -m[5], -m[8]];
    // 画面の上方向（画面回転を補正して端末座標に直してから地上座標へ）
    const th = ((screen.orientation && screen.orientation.angle) || 0) * astro.D2R;
    const su = [-Math.sin(th), Math.cos(th), 0];
    let yE = [
      m[0] * su[0] + m[1] * su[1],
      m[3] * su[0] + m[4] * su[1],
      m[6] * su[0] + m[7] * su[1],
    ];
    if (hasHeading) {
      // iOS: 「真のα = 360 − compassHeading」が成り立つのは水平寄りの姿勢のみ。
      // そこで求めた真北とのずれ（オフセット）を、上を向いている間は凍結して使う
      const wrap180 = x => ((x % 360) + 540) % 360 - 180;
      const cand = wrap180(360 - e.webkitCompassHeading - alpha);
      if (this.headingOffset == null) {
        this.headingOffset = cand;
      } else if (v[2] < 0.7) { // かざし先の高度が45°未満のときだけ校正を更新
        this.headingOffset = wrap180(this.headingOffset + wrap180(cand - this.headingOffset) * 0.05);
      }
      // 真の方位 = 相対方位 − δ（α増加は方位減少に対応するため符号が反転する）
      const dR = -this.headingOffset * astro.D2R, cD = Math.cos(dR), sD = Math.sin(dR);
      const rotZ = a => [a[0] * cD + a[1] * sD, -a[0] * sD + a[1] * cD, a[2]];
      v = rotZ(v);
      yE = rotZ(yE);
    }
    // 角度(az/alt/roll)には分解しない。天頂付近で方位角が不定になるため、
    // ベクトルのままframe側で平滑化する（B-003）
    this.targetVec = v;
    this.targetUp = yE;
    this.hasReading = true;
  },
  async start() {
    if (location.protocol === "file:" || (location.protocol !== "https:" && !["localhost", "127.0.0.1"].includes(location.hostname))) {
      toast("センサーはHTTPSでのみ使えます。手動モードで表示します");
      return false;
    }
    try {
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        const p = await DeviceOrientationEvent.requestPermission();
        if (p !== "granted") { toast("センサーが許可されませんでした。手動モードで表示します"); return false; }
      }
    } catch (err) {
      toast("センサーを開始できませんでした。手動モードで表示します");
      return false;
    }
    // 再試行時にリスナーが重複しないよう、登録済みのものを外してから付け直す
    if (!this._handler) this._handler = this._onEvent.bind(this);
    const eventName = "ondeviceorientationabsolute" in window ? "deviceorientationabsolute" : "deviceorientation";
    this.expectAbsolute = eventName === "deviceorientationabsolute";
    window.removeEventListener(eventName, this._handler);
    window.addEventListener(eventName, this._handler);
    // 1.2秒待って読み値が来なければセンサー無しと判断
    await new Promise(res => setTimeout(res, 1200));
    if (!this.hasReading) {
      window.removeEventListener(eventName, this._handler);
      toast("方位センサーが見つかりません。手動モードで表示します");
      return false;
    }
    this.active = true;
    return true;
  },
};

// ---- 描画 ----
const canvas = document.getElementById("sky");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);

const PALETTE = {
  normal: {
    skyTop: "#04060e", skyBottom: "#0a1024",
    star: "255,255,255", line: "rgba(110,160,255,0.4)",
    constName: "rgba(150,185,255,0.5)", starName: "rgba(230,238,255,0.85)",
    horizon: "rgba(120,200,150,0.5)", dir: "rgba(160,220,180,0.9)",
    select: "#ffd27f",
  },
  red: {
    skyTop: "#080101", skyBottom: "#160404",
    star: "255,120,100", line: "rgba(255,90,70,0.35)",
    constName: "rgba(255,110,90,0.5)", starName: "rgba(255,150,130,0.85)",
    horizon: "rgba(255,100,80,0.5)", dir: "rgba(255,120,100,0.9)",
    select: "#ffb08f",
  },
};

// 星ごとの単位ベクトルと画面座標のキャッシュ（フレーム毎に更新）
const starVec = new Float64Array(STARS.length * 3);
const starXY = new Float32Array(STARS.length * 2);
const starVis = new Uint8Array(STARS.length);
const starAlt = new Float32Array(STARS.length);

function computeSky(nowMs) {
  const jd = astro.julianDate(nowMs);
  const lstDeg = astro.lst(jd, state.lon);
  for (let i = 0; i < STARS.length; i++) {
    const s = STARS[i];
    const aa = astro.raDecToAltAz(s[0], s[1], lstDeg, state.lat);
    const v = astro.altAzToVec(aa.alt, aa.az);
    starVec[i * 3] = v[0]; starVec[i * 3 + 1] = v[1]; starVec[i * 3 + 2] = v[2];
    starAlt[i] = aa.alt;
  }
}

function draw(nowMs) {
  const pal = state.redMode ? PALETTE.red : PALETTE.normal;
  const cam = (state.mode === "sensor" && state.fVec)
    ? projection.cameraFromVectors(state.fVec, state.upVec)
    : projection.makeCamera(state.az, state.alt, state.roll);
  const focal = projection.focalLength(state.fovDeg, H);
  const cx = W / 2, cy = H / 2;
  const margin = 120;

  // 空のグラデーション
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, pal.skyTop); g.addColorStop(1, pal.skyBottom);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // 星の投影
  for (let i = 0; i < STARS.length; i++) {
    const p = projection.project(cam, [starVec[i * 3], starVec[i * 3 + 1], starVec[i * 3 + 2]], focal, cx, cy);
    if (p && p[0] > -margin && p[0] < W + margin && p[1] > -margin && p[1] < H + margin) {
      starXY[i * 2] = p[0]; starXY[i * 2 + 1] = p[1]; starVis[i] = 1;
    } else {
      starVis[i] = 0;
    }
  }

  // 星座線
  if (state.showLines) {
    ctx.strokeStyle = pal.line;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (const abbr in LINES) {
      const seg = LINES[abbr];
      for (let k = 0; k < seg.length; k += 2) {
        const a = seg[k], b = seg[k + 1];
        if (!starVis[a] || !starVis[b]) continue;
        if (starAlt[a] < -10 && starAlt[b] < -10) continue;
        ctx.moveTo(starXY[a * 2], starXY[a * 2 + 1]);
        ctx.lineTo(starXY[b * 2], starXY[b * 2 + 1]);
      }
    }
    ctx.stroke();
    // 選択中の星座を強調
    if (state.selected && state.selected.type === "const") {
      const seg = LINES[state.selected.abbr] || [];
      ctx.strokeStyle = pal.select;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      for (let k = 0; k < seg.length; k += 2) {
        const a = seg[k], b = seg[k + 1];
        if (!starVis[a] || !starVis[b]) continue;
        ctx.moveTo(starXY[a * 2], starXY[a * 2 + 1]);
        ctx.lineTo(starXY[b * 2], starXY[b * 2 + 1]);
      }
      ctx.stroke();
    }
  }

  // 星本体（地平線下は減光）
  for (let i = 0; i < STARS.length; i++) {
    if (!starVis[i]) continue;
    const mag = STARS[i][2];
    const r = Math.max(0.6, 4.4 - 0.78 * mag);
    let alpha = mag <= 1 ? 1 : Math.max(0.35, 1 - (mag - 1) * 0.16);
    if (starAlt[i] < 0) alpha *= 0.12;
    ctx.fillStyle = `rgba(${pal.star},${alpha.toFixed(2)})`;
    ctx.beginPath();
    ctx.arc(starXY[i * 2], starXY[i * 2 + 1], r, 0, 6.2832);
    ctx.fill();
  }

  // 星の名前
  if (state.showNames) {
    const magLimit = state.fovDeg <= 45 ? 2.8 : 1.6;
    ctx.fillStyle = pal.starName;
    ctx.font = "11px sans-serif";
    ctx.textAlign = "left";
    for (let i = 0; i < STARS.length; i++) {
      if (!starVis[i] || starAlt[i] < 0) continue;
      const s = STARS[i];
      if (!s[3] || s[2] > magLimit) continue;
      ctx.fillText(s[3], starXY[i * 2] + 8, starXY[i * 2 + 1] + 4);
    }
  }

  // 星座名（線の星の平均方向に表示）
  if (state.showConstNames && state.showLines) {
    ctx.fillStyle = pal.constName;
    ctx.font = "12px sans-serif";
    ctx.textAlign = "center";
    for (const abbr in LINES) {
      const seg = LINES[abbr];
      if (!seg.length) continue;
      let vx = 0, vy = 0, vz = 0, cnt = 0, visCnt = 0;
      const used = new Set();
      for (const idx of seg) {
        if (used.has(idx)) continue;
        used.add(idx);
        vx += starVec[idx * 3]; vy += starVec[idx * 3 + 1]; vz += starVec[idx * 3 + 2];
        cnt++;
        if (starVis[idx]) visCnt++;
      }
      if (visCnt < Math.max(2, cnt * 0.4)) continue;
      const n = Math.hypot(vx, vy, vz);
      if (n < 1e-9) continue;
      const p = projection.project(cam, [vx / n, vy / n, vz / n], focal, cx, cy);
      if (!p || p[0] < 0 || p[0] > W || p[1] < 0 || p[1] > H) continue;
      const info = CONST_INFO[abbr];
      if (info) ctx.fillText(info.jp, p[0], p[1]);
    }
  }

  // 選択中の星の強調リング
  if (state.selected && state.selected.type === "star" && starVis[state.selected.i]) {
    const i = state.selected.i;
    ctx.strokeStyle = pal.select;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(starXY[i * 2], starXY[i * 2 + 1], 12, 0, 6.2832);
    ctx.stroke();
  }

  // 地平線と方位
  ctx.strokeStyle = pal.horizon;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  let started = false;
  for (let azd = 0; azd <= 360; azd += 2) {
    const p = projection.project(cam, astro.altAzToVec(0, azd), focal, cx, cy);
    if (p) {
      if (started) ctx.lineTo(p[0], p[1]); else { ctx.moveTo(p[0], p[1]); started = true; }
    } else {
      started = false;
    }
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = pal.dir;
  ctx.font = "600 14px sans-serif";
  ctx.textAlign = "center";
  for (let d = 0; d < 8; d++) {
    const p = projection.project(cam, astro.altAzToVec(0, d * 45), focal, cx, cy);
    if (p && p[0] > -20 && p[0] < W + 20 && p[1] > -20 && p[1] < H + 20) {
      ctx.fillText(DIRS8[d], p[0], p[1] + 20);
    }
  }
}

// ---- メインループ ----
let lastSkyCompute = 0;
function frame() {
  const now = Date.now();
  // 恒星時変化は遅いので座標計算は200ms間隔で十分（描画は毎フレーム）
  if (now - lastSkyCompute > 200) { computeSky(now); lastSkyCompute = now; }

  if (state.mode === "sensor" && sensor.targetVec) {
    // 平滑化はベクトルのまま行う（角度だと天頂付近で方位が飛ぶ）
    const k = 0.25;
    if (!state.fVec) {
      state.fVec = sensor.targetVec.slice();
      state.upVec = sensor.targetUp.slice();
    } else {
      for (let i = 0; i < 3; i++) {
        state.fVec[i] += (sensor.targetVec[i] - state.fVec[i]) * k;
        state.upVec[i] += (sensor.targetUp[i] - state.upVec[i]) * k;
      }
    }
    // HUD・タップ表示用の角度（センサーモードの描画には使わない）
    const f = state.fVec;
    const n = Math.hypot(f[0], f[1], f[2]) || 1;
    state.alt = Math.asin(Math.max(-1, Math.min(1, f[2] / n))) / astro.D2R;
    state.az = (Math.atan2(f[0], f[1]) / astro.D2R + 360) % 360;
  }

  draw(now);
  updateHud(now);
  requestAnimationFrame(frame);
}

// ---- HUD ----
const clockEl = document.getElementById("clock");
const gazeEl = document.getElementById("gaze");
// ?debug でセンサー生値のオーバーレイを表示（実機検証用）
let debugEl = null;
if (new URLSearchParams(location.search).has("debug")) {
  debugEl = document.createElement("div");
  debugEl.style.cssText = "position:fixed;left:8px;bottom:48px;z-index:40;font:11px/1.5 monospace;" +
    "color:#8f8;background:#000a;padding:6px 8px;border-radius:6px;pointer-events:none;white-space:pre";
  document.body.appendChild(debugEl);
}
let lastHud = 0;
function updateHud(now) {
  if (now - lastHud < 250) return;
  lastHud = now;
  const d = new Date(now);
  clockEl.textContent = `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  const dir = DIRS8[Math.round(((state.az % 360) + 360) % 360 / 45) % 8];
  gazeEl.textContent = `${dir} ${Math.round(state.az)}° ／ 高度 ${Math.round(state.alt)}°`;
  if (debugEl) {
    const r = sensor.lastRaw, tv = sensor.targetVec;
    const f1 = x => (typeof x === "number" ? x.toFixed(1) : String(x));
    let targetLine = "";
    if (tv) {
      const tAz = (Math.atan2(tv[0], tv[1]) / astro.D2R + 360) % 360;
      const tAlt = Math.asin(Math.max(-1, Math.min(1, tv[2]))) / astro.D2R;
      targetLine = `target az:${f1(tAz)} alt:${f1(tAlt)}\n`;
    }
    debugEl.textContent =
      `mode:${state.mode} active:${sensor.active}\n` +
      (r ? `ev:${r.type} abs:${r.absolute}\nα:${f1(r.alpha)} β:${f1(r.beta)} γ:${f1(r.gamma)} hd:${f1(r.heading)}\n` : "ev:none\n") +
      targetLine +
      `view az:${f1(state.az)} alt:${f1(state.alt)}\n` +
      `scr:${(screen.orientation && screen.orientation.angle) || 0}°`;
  }
}

// ---- タップ判定 ----
function pickAt(x, y) {
  // 星: 近さと明るさで重み付け
  let best = -1, bestScore = 1e9;
  for (let i = 0; i < STARS.length; i++) {
    if (!starVis[i] || starAlt[i] < -5) continue;
    const dx = starXY[i * 2] - x, dy = starXY[i * 2 + 1] - y;
    const dist = Math.hypot(dx, dy);
    if (dist > 26) continue;
    const score = dist + STARS[i][2] * 3; // 暗い星ほど選ばれにくく
    if (score < bestScore) { bestScore = score; best = i; }
  }
  if (best >= 0) return { type: "star", i: best };
  // 星座線: 線分との距離
  if (state.showLines) {
    for (const abbr in LINES) {
      const seg = LINES[abbr];
      for (let k = 0; k < seg.length; k += 2) {
        const a = seg[k], b = seg[k + 1];
        if (!starVis[a] || !starVis[b]) continue;
        const ax = starXY[a * 2], ay = starXY[a * 2 + 1];
        const bx = starXY[b * 2], by = starXY[b * 2 + 1];
        const len2 = (bx - ax) ** 2 + (by - ay) ** 2;
        if (len2 < 1) continue;
        let t = ((x - ax) * (bx - ax) + (y - ay) * (by - ay)) / len2;
        t = Math.max(0, Math.min(1, t));
        const dist = Math.hypot(x - (ax + t * (bx - ax)), y - (ay + t * (by - ay)));
        if (dist < 12) return { type: "const", abbr };
      }
    }
  }
  return null;
}

// ---- 情報カード ----
const cardEl = document.getElementById("card");
function showCard(sel) {
  state.selected = sel;
  const title = document.getElementById("cardTitle");
  const sub = document.getElementById("cardSub");
  const desc = document.getElementById("cardDesc");
  const meta = document.getElementById("cardMeta");
  if (sel.type === "star") {
    const s = STARS[sel.i];
    const info = CONST_INFO[s[4]];
    const conJp = info ? info.jp : s[4];
    title.textContent = s[3] || (conJp ? `${conJp}の星` : "名もなき星");
    sub.textContent = conJp || "";
    desc.textContent = info ? info.desc : "";
    const dir = DIRS8[Math.round(((starAzOf(sel.i) % 360) + 360) % 360 / 45) % 8];
    meta.textContent = `等級 ${s[2].toFixed(1)} ／ いま ${dir}の空・高度 ${Math.round(starAlt[sel.i])}°`;
  } else {
    const info = CONST_INFO[sel.abbr];
    title.textContent = info ? info.jp : sel.abbr;
    sub.textContent = "星座";
    desc.textContent = info ? info.desc : "";
    meta.textContent = "";
  }
  cardEl.classList.add("show");
}
function starAzOf(i) {
  return Math.atan2(starVec[i * 3], starVec[i * 3 + 1]) / astro.D2R;
}
function hideCard() {
  cardEl.classList.remove("show");
  state.selected = null;
}
document.getElementById("cardClose").addEventListener("click", hideCard);

// ---- ポインタ操作（ドラッグ・ピンチ・タップ） ----
const pointers = new Map();
let dragMoved = 0, pinchDist = 0;
canvas.addEventListener("pointerdown", e => {
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  dragMoved = 0;
  if (pointers.size === 2) {
    const [p1, p2] = [...pointers.values()];
    pinchDist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
  }
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", e => {
  const p = pointers.get(e.pointerId);
  if (!p) return;
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  p.x = e.clientX; p.y = e.clientY;
  dragMoved += Math.abs(dx) + Math.abs(dy);
  if (pointers.size === 1 && state.mode === "drag") {
    const degPerPx = state.fovDeg / H;
    state.az = (state.az - dx * degPerPx + 360) % 360;
    state.alt = Math.max(-30, Math.min(89.9, state.alt + dy * degPerPx));
  } else if (pointers.size === 2) {
    const [p1, p2] = [...pointers.values()];
    const d = Math.hypot(p1.x - p2.x, p1.y - p2.y);
    if (pinchDist > 0) setFov(state.fovDeg * pinchDist / d);
    pinchDist = d;
  }
});
canvas.addEventListener("pointerup", e => {
  pointers.delete(e.pointerId);
  if (pointers.size === 0 && dragMoved < 8) {
    const sel = pickAt(e.clientX, e.clientY);
    if (sel) showCard(sel);
    else { hideCard(); closeSettings(); }
  }
});
canvas.addEventListener("pointercancel", e => pointers.delete(e.pointerId));
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  setFov(state.fovDeg * (e.deltaY > 0 ? 1.08 : 0.93));
}, { passive: false });

let fovSaveTimer = 0;
function setFov(v) {
  state.fovDeg = Math.max(25, Math.min(100, v));
  fovRange.value = state.fovDeg;
  fovVal.textContent = `${Math.round(state.fovDeg)}°`;
  // ピンチ/ホイール中は連続発火するので、localStorage書き込みはデバウンス
  clearTimeout(fovSaveTimer);
  fovSaveTimer = setTimeout(saveSettings, 300);
}

// ---- キーボード ----
window.addEventListener("keydown", e => {
  // 設定パネルのselect/range等のネイティブなキー操作を横取りしない
  const focused = document.activeElement;
  if (focused && (focused.tagName === "SELECT" || focused.tagName === "INPUT")) return;
  const step = state.fovDeg / 18;
  switch (e.key) {
    case "ArrowLeft": if (state.mode === "drag") state.az = (state.az - step + 360) % 360; break;
    case "ArrowRight": if (state.mode === "drag") state.az = (state.az + step) % 360; break;
    case "ArrowUp": if (state.mode === "drag") state.alt = Math.min(89.9, state.alt + step); break;
    case "ArrowDown": if (state.mode === "drag") state.alt = Math.max(-30, state.alt - step); break;
    case "+": case "=": setFov(state.fovDeg * 0.9); break;
    case "-": setFov(state.fovDeg * 1.1); break;
    case "l": case "L": optLines.checked = !optLines.checked; applyOpts(); break;
    case "n": case "N": optNames.checked = !optNames.checked; applyOpts(); break;
    case "r": case "R": optRed.checked = !optRed.checked; applyOpts(); break;
    case "Escape": hideCard(); closeSettings(); break;
    default: return;
  }
  e.preventDefault();
});

// ---- 設定パネル ----
const settingsEl = document.getElementById("settings");
const citySel = document.getElementById("citySel");
const fovRange = document.getElementById("fovRange");
const fovVal = document.getElementById("fovVal");
const optLines = document.getElementById("optLines");
const optNames = document.getElementById("optNames");
const optConstNames = document.getElementById("optConstNames");
const optRed = document.getElementById("optRed");

CITIES.forEach(([name], i) => {
  const o = document.createElement("option");
  o.value = i; o.textContent = name;
  citySel.appendChild(o);
});
citySel.addEventListener("change", () => {
  const c = CITIES[citySel.value];
  if (c[1] == null) { requestGeo(); return; }
  setLocation(c[1], c[2], c[0]);
});
document.getElementById("geoBtn").addEventListener("click", requestGeo);
document.getElementById("settingsBtn").addEventListener("click", () => settingsEl.classList.toggle("show"));
const statusEl = document.getElementById("status");
statusEl.addEventListener("click", () => settingsEl.classList.toggle("show"));
statusEl.addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); settingsEl.classList.toggle("show"); }
});
function closeSettings() { settingsEl.classList.remove("show"); }

function setLocation(lat, lon, name) {
  state.lat = lat; state.lon = lon; state.locationName = name;
  document.getElementById("locName").textContent = name;
  lastSkyCompute = 0; // 即再計算
  saveSettings();
}
function requestGeo() {
  if (!navigator.geolocation) { toast("この環境では位置情報が使えません"); return; }
  toast("現在地を取得中…");
  navigator.geolocation.getCurrentPosition(
    pos => {
      setLocation(
        Math.round(pos.coords.latitude * 1000) / 1000,
        Math.round(pos.coords.longitude * 1000) / 1000,
        "現在地"
      );
      toast(`現在地を設定しました（北緯${state.lat.toFixed(1)}° 東経${state.lon.toFixed(1)}°）`);
    },
    () => toast("位置情報を取得できませんでした。都市リストから選んでください"),
    { timeout: 8000, maximumAge: 600000 }
  );
}

[optLines, optNames, optConstNames, optRed].forEach(el => el.addEventListener("change", applyOpts));
function applyOpts() {
  state.showLines = optLines.checked;
  state.showNames = optNames.checked;
  state.showConstNames = optConstNames.checked;
  state.redMode = optRed.checked;
  document.body.classList.toggle("red", state.redMode);
  saveSettings();
}
fovRange.addEventListener("input", () => setFov(Number(fovRange.value)));

// ---- モード切替 ----
const modeBtn = document.getElementById("modeBtn");
let sensorStarting = false; // 連打でstart()（許可ダイアログ・リスナー登録）が多重に走るのを防ぐ
modeBtn.addEventListener("click", async () => {
  if (sensorStarting) return;
  if (state.mode === "sensor") {
    state.mode = "drag";
    // 直前の視線を引き継ぎつつ、ドラッグ用の角度系にリセット
    state.roll = 0;
    state.alt = Math.min(89.9, state.alt);
    state.fVec = null;
    applyMode();
    return;
  }
  if (!sensor.active) {
    sensorStarting = true;
    try {
      toast("センサーを開始しています…");
      const ok = await sensor.start();
      if (!ok) { state.mode = "drag"; applyMode(); return; }
    } finally {
      sensorStarting = false;
    }
  }
  state.mode = "sensor";
  applyMode();
});
function applyMode() {
  modeBtn.textContent = state.mode === "sensor" ? "📡" : "✋";
  const label = state.mode === "sensor" ? "センサー追従中（タップで手動へ）" : "手動モード（タップでセンサーへ）";
  modeBtn.title = label;
  modeBtn.setAttribute("aria-label", label);
  toast(state.mode === "sensor" ? "スマホをかざす方向に空が動きます" : "ドラッグで空を見回せます");
}

// ---- トースト ----
let toastTimer = 0;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
}

// ---- オンボーディング ----
const onboardEl = document.getElementById("onboard");
document.getElementById("startSensor").addEventListener("click", async () => {
  onboardEl.classList.add("hide");
  state.onboarded = true;
  // iOSのrequestPermission()は「ユーザー操作の直中」でしか許可ダイアログを出せない。
  // 先に位置情報プロンプトを挟むと操作権が消費されて無言で失敗するため、センサーを先に
  const ok = await sensor.start();
  state.mode = ok ? "sensor" : "drag";
  applyMode();
  requestGeo();
  saveSettings();
});
document.getElementById("startDrag").addEventListener("click", () => {
  onboardEl.classList.add("hide");
  state.onboarded = true;
  state.mode = "drag";
  applyMode();
  saveSettings();
});

// ---- 起動 ----
loadSettings();
document.body.classList.toggle("red", state.redMode);
optLines.checked = state.showLines;
optNames.checked = state.showNames;
optConstNames.checked = state.showConstNames;
optRed.checked = state.redMode;
document.getElementById("locName").textContent = state.locationName;
citySel.value = String(Math.max(0, CITIES.findIndex(c => c[0] === state.locationName)));
setFov(state.fovDeg);
if (state.onboarded) onboardEl.classList.add("hide");
resize();
computeSky(Date.now());
frame();
</script>
</body>
